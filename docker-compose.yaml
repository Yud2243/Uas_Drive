services:
  web:
    image: php:8.2-apache
    container_name: dibra_web_app
    ports:
      - "8081:80"
    volumes:
      - ./app:/var/www/html
    depends_on:
      - storage

  storage:
    image: minio/minio
    container_name: dibra_minio_storage
    ports:
      - "9005:9000" # Aman dari bentrok port lokal
      - "9006:9001" # Web console MinIO
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data 
    command: server /data --console-address ":9001"

volumes:
  minio_data: